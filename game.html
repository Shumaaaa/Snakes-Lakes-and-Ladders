<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐍 Adventure — Playing!</title>
  <link rel="stylesheet" href="css/themes.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/board.css"/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body style="overflow:hidden">

<!-- TOP BAR -->
<div class="top-bar">
  <div class="game-title">🐍 Adventure S&amp;L</div>
  <div class="timer-display" id="timerDisplay">⏱️ 00:00</div>
  <div class="top-actions">
    <label class="toggle-switch">
      <input type="checkbox" id="themeCheck" onchange="toggleTheme()"/>
      <span class="slider"></span>
    </label>
    <button class="icon-btn" onclick="goHome()" title="Back to Setup">🏠</button>
  </div>
</div>

<!-- GAME LAYOUT -->
<div class="game-layout">

  <!-- BOARD (left, big) -->
  <div class="board-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- RIGHT PANEL -->
  <div class="side-panel">

    <!-- Dice Card -->
    <div class="panel-card dice-card">
      <div class="panel-title">🎲 Dice</div>
      <div id="diceDisplay">🎲</div>
      <div id="turnLabel"  class="turn-label">Loading…</div>
      <div id="statusMsg"  class="status-msg"></div>
      <button id="rollBtn" class="roll-btn" onclick="rollDice()">🎲 Roll!</button>
    </div>

    <!-- Player Cards (one per player, generated by JS) -->
    <div id="playerCards"></div>

    <!-- Game Log -->
    <div class="panel-card">
      <div class="panel-title">📜 Game Log</div>
      <div id="gameLog" class="game-log"></div>
    </div>

  </div>
</div>

<!-- WIN MODAL -->
<div id="winModal" class="modal-overlay">
  <div class="modal-box">
    <span class="win-trophy">🏆</span>
    <h2 id="winTitle">Victory!</h2>
    <p  id="winSub"></p>
    <div class="stats-grid" id="statsGrid"></div>
    <button class="start-btn" onclick="goHome()">🔄 Play Again</button>
  </div>
</div>

<!-- CONVERTER MODAL -->
<div id="converterModal" class="modal-overlay">
  <div class="modal-box small-modal">
    <h2>🎲 Dice Converter</h2>
    <p>You rolled <strong id="originalRoll">—</strong>. Pick your number:</p>
    <div class="converter-btns">
      <button onclick="applyConverter(1)">⚀ 1</button>
      <button onclick="applyConverter(2)">⚁ 2</button>
      <button onclick="applyConverter(3)">⚂ 3</button>
      <button onclick="applyConverter(4)">⚃ 4</button>
      <button onclick="applyConverter(5)">⚄ 5</button>
      <button onclick="applyConverter(6)">⚅ 6</button>
    </div>
    <button class="cancel-btn" onclick="closeConverter()">Keep original roll</button>
  </div>
</div>

<!-- Toast -->
<div id="itemPrompt" class="item-toast"></div>

<!-- SCRIPTS — order matters! -->
<script src="js/config.js"></script>
<script src="js/terrain.js"></script>
<script src="js/players.js"></script>
<script src="js/board.js"></script>
<script src="js/animations.js"></script>
<script src="js/sound.js"></script>
<script src="js/ui.js"></script>
<script src="js/game.js"></script>
</body>
</html>
